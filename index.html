<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"> 
<title>Admin DEX Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>🔥 Admin DEX Panel</h1>

<button id="connectBtn" class="mainBtn">Connect Wallet</button>

<p id="wallet">Not Connected</p>
<p id="status"></p>

<div class="card">
<h2>📊 Contract Info</h2>

<div class="grid">
<div>
Contract Balance<br>
<span id="contractBalance">0</span> POL
</div>
  
<p>POL Tax Balance: <span id="polTaxBalance">0</span></p>
  
<div>
Available Liquidity<br>
<span id="availableLiquidity">0</span> POL
</div>
</div>

</div>

<div class="card">

<h2>💸 Withdraw Controls</h2>

<button id="withdrawAllBtn">Withdraw ALL Liquidity</button>

<div class="inputBox">
<input id="withdrawAmount" placeholder="Enter POL amount">
<button id="withdrawAmountBtn">Withdraw Amount</button>
</div>

<button id="withdrawTaxBtn">Withdraw POL Tax</button>

<div class="inputBox">
<input id="withdrawTRC" placeholder="Enter TRC amount">
<button id="withdrawTRCBtn">Withdraw Unsold TRC</button>
</div>

</div>

<!-- ================= USDT SECTION ================= -->

<div class="card" style="margin-top:20px;">

<h2>💵 USDT Liquidity Panel</h2>

<div class="grid">

<div>
USDT Liquidity<br>
<span id="usdtLiquidity">0</span> USDT
</div>

</div>

<br>

<h3>Withdraw USDT</h3>

<button id="withdrawAllUSDTBtn" style="margin-bottom:10px;">
Withdraw ALL USDT
</button>

<div class="inputBox" style="margin-top:10px;">
<input id="withdrawUSDTAmount" placeholder="Enter USDT amount">
<button id="withdrawUSDTBtn">Withdraw USDT</button>
</div>

<br>
<p>USDT Tax Balance: <span id="usdtTaxBalance">0</span></p>
<h3>Withdraw USDT Tax</h3>

<button id="withdrawUSDTTaxBtn">
Withdraw USDT Tax
</button>

</div>

<!-- ================= END USDT SECTION ================= -->


  
<div class="card">
<h2>📈 Liquidity Chart</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
